<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAL — Hybrid Assignment Logic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f5;color:#2c2c2a;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
#topbar{background:#1e3a5f;color:#e0eaff;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;flex-shrink:0}
#topbar h1{font-size:17px;font-weight:600;letter-spacing:0.04em}
#topbar .sub{font-size:12px;opacity:0.6}
#scene-counter{margin-left:auto;font-size:12px;opacity:0.5}

/* Main layout: sidebar + content */
#main{flex:1;display:flex;min-height:0}

/* Sidebar */
#sidebar{width:220px;background:#1e3a5f;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.menu-group{padding:16px 12px 8px}
.menu-group-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#5b7fa8;padding:0 8px;margin-bottom:6px}
.menu-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all 0.15s;margin-bottom:2px}
.menu-item:hover{background:rgba(255,255,255,0.08)}
.menu-item.active{background:rgba(255,255,255,0.15);box-shadow:inset 3px 0 0 #93c5fd}
.menu-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;background:rgba(255,255,255,0.1);color:#e0eaff}
.menu-item.active .menu-num{background:#2563eb;color:#fff}
.menu-label{font-size:12px;color:#c0d4ea;line-height:1.3;font-weight:400}
.menu-item.active .menu-label{color:#fff;font-weight:500}
.menu-divider{height:0.5px;background:rgba(255,255,255,0.1);margin:8px 12px}

/* Content area */
#content{flex:1;display:flex;min-height:0}

/* Left: narrative */
#narrative{width:42%;background:#fff;border-right:0.5px solid #d3d1c7;padding:32px 32px 24px;display:flex;flex-direction:column;overflow-y:auto}
#scene-title{font-size:20px;font-weight:600;color:#1e3a5f;margin-bottom:18px;line-height:1.3}
#scene-text{font-size:14px;line-height:1.8;color:#2c2c2a;flex:1}
#scene-text b{color:#1e3a5f;font-weight:600}
#scene-text em{color:#C05500;font-style:normal;font-weight:600}

/* Step nav */
#step-nav{display:none;gap:8px;margin-top:20px;padding-top:20px;border-top:0.5px solid #e0deda}
.step-btn{flex:1;font-size:12px;padding:8px 0;border-radius:8px;border:1.5px solid #d3d1c7;background:#f1efe8;color:#5f5e5a;cursor:pointer;font-family:inherit;font-weight:500;text-align:center;transition:all 0.15s}
.step-btn.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f;box-shadow:0 2px 6px rgba(30,58,95,0.25)}
.step-btn:hover:not(.active){background:#e8e5dc;color:#2c2c2a}

/* Right: card area */
#card-area{flex:1;overflow-y:auto;padding:24px 28px;background:#f8f7f5}

/* Bottom nav */
#nav-bar{background:#f0ede8;border-top:1px solid #d3d1c7;padding:0 24px;height:58px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-btn{font-size:13px;padding:8px 28px;border-radius:8px;border:none;background:#1e3a5f;color:#fff;cursor:pointer;font-family:inherit;font-weight:500;transition:all 0.15s;letter-spacing:0.02em}
.nav-btn:hover{background:#2a4f7c;box-shadow:0 2px 8px rgba(30,58,95,0.3)}
.nav-btn:disabled{opacity:0.25;cursor:default;box-shadow:none}
#progress-bar{flex:1;height:4px;background:#d3d1c7;border-radius:2px;overflow:hidden}
#progress-fill{height:100%;background:#1e3a5f;border-radius:2px;transition:width 0.4s}

/* Scene card components */
.sc-note{font-size:13px;color:#444441;line-height:1.55;padding:10px 13px;background:#fff;border-radius:8px;margin-bottom:10px;border-left:3px solid #EF9F27;border:0.5px solid #e0deda;border-left-width:3px;border-left-color:#EF9F27}
.sc-card{background:#fff;border:0.5px solid #d3d1c7;border-radius:10px;padding:16px 18px;margin-bottom:10px}
.sc-pill{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:3px 11px 3px 3px;margin-bottom:11px}
.sc-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;flex-shrink:0}
.sc-route{display:flex;flex-direction:column;margin:8px 0 0 2px}
.sc-stop{display:flex;align-items:flex-start;gap:8px}
.sc-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:600}
.ic-col{background:#E6F1FB;color:#0C447C;border:1.5px solid #85B7EB}
.ic-new{background:#FAEEDA;color:#633806;border:1.5px solid #EF9F27}
.ic-del{background:#F1EFE8;color:#444441;border:1.5px solid #B4B2A9}
.ic-breach{background:#FCEBEB;color:#791F1F;border:1.5px solid #F09595}
.ic-ret{background:#EEEDFE;color:#3C3489;border:1.5px solid #AFA9EC}
.sc-line{width:1px;background:#d3d1c7;height:18px;margin-left:11px}
.sc-line-warn{width:1px;background:#F09595;height:18px;margin-left:11px;opacity:0.7}
.sc-body{padding-bottom:14px;flex:1}
.sc-body.last{padding-bottom:0}
.sc-lbl{font-size:13px;font-weight:500;color:#2c2c2a;line-height:1.3}
.sc-sub{font-size:12px;color:#666460;margin-top:1px}
.sc-time{font-size:13px;font-weight:600;white-space:nowrap;margin-left:auto;padding-left:8px}
.t-hi{color:#1D9E75}.t-red{color:#A32D2D}.t-muted{color:#888780}
.sc-tag{background:#FDEDC8;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;color:#7A3F00;margin-left:4px}
.sc-pritag{background:#FDDEDE;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;color:#8B1A1A;margin-left:4px}
.sc-bretag{background:#FDDEDE;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;color:#8B1A1A;margin-left:4px}
.sc-stats{display:flex;gap:6px;margin-top:10px}
.sc-stat{flex:1;background:#f8f7f5;border-radius:6px;padding:8px 10px}
.sc-val{font-size:18px;font-weight:600;color:#2c2c2a;line-height:1}
.sc-val.amber{color:#854F0B}.sc-val.red{color:#A32D2D}.sc-val.green{color:#1D9E75}
.sc-lbl2{font-size:11px;color:#666460;margin-top:2px}
.sc-divider{height:0.5px;background:#e0deda;margin:12px 0}
.sc-prompt-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.sc-pdot{width:7px;height:7px;border-radius:50%;background:#BA7517;flex-shrink:0}
.sc-pdot.red{background:#E24B4A}
.sc-ptitle{font-size:14px;font-weight:600;color:#2c2c2a}
.sc-alt{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:0.5px solid #e0deda}
.sc-alt:last-child{border-bottom:none}
.sc-adot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.sc-ainfo{flex:1}
.sc-aname{font-size:13px;font-weight:500;color:#2c2c2a}
.sc-adet{font-size:12px;color:#555452;margin-top:1px;line-height:1.4}
.sc-abadge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;margin-top:2px;display:inline-block}
.ab-green{background:#D1F5E8;color:#065535}
.ab-amber{background:#FDEDC8;color:#7A3F00}
.ab-red{background:#FDDEDE;color:#8B1A1A}
.ab-gray{background:#F1EFE8;color:#5F5E5A}
.ab-blue{background:#E6F1FB;color:#0C447C}
.sc-verdict{background:#C8EFE0;border-radius:6px;padding:10px 12px;font-size:12px;font-weight:600;color:#065535;margin-top:10px;line-height:1.5;border-left:3px solid #1D9E75}
.sc-warn{padding:9px 12px;border-radius:6px;background:#FCEBEB;border:0.5px solid #F09595;margin-top:10px;font-size:11px;color:#791F1F;line-height:1.5}
.sc-info{padding:9px 12px;border-radius:6px;background:#f8f7f5;border:0.5px solid #e0deda;margin-top:10px;font-size:12px;color:#5f5e5a;line-height:1.5;border-left:2px solid #d3d1c7}
.sc-jobrow{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid #e0deda}
.sc-jobrow:last-child{border-bottom:none}
.sc-jid{font-size:10px;font-weight:500;color:#888780;width:24px;flex-shrink:0}
.sc-jname{font-size:13px;font-weight:500;color:#2c2c2a;flex:1}
.sc-jtag{font-size:10px;font-weight:600;border-radius:3px;padding:1px 5px}
.jt-silent{background:#D1F5E8;color:#065535}
.jt-prompt{background:#FDEDC8;color:#7A3F00}
.sc-stag{font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;margin-left:4px}
.st-c{background:#E6F1FB;color:#0C447C}
.st-f{background:#E1F5EE;color:#085041}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt-card{border:0.5px solid #e0deda;border-radius:8px;padding:11px 13px}
.opt-card.good{border-color:#5DCAA5;border-width:1.5px}
.opt-card.bad{border-color:#F09595}
.opt-label{font-size:10px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:5px}
.corridor-hdr{display:flex;align-items:center;gap:7px;margin:12px 0 8px;padding-bottom:6px;border-bottom:0.5px solid #e0deda}
.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.time-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.tp-green{background:#E1F5EE;color:#085041}
.tp-amber{background:#FAEEDA;color:#633806}
.tp-red{background:#FCEBEB;color:#791F1F}
.drv-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #e0deda}
.drv-row:last-child{border-bottom:none}
.drv-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.drv-name{font-size:12px;font-weight:500;color:#2c2c2a;flex:1}
.drv-times{display:flex;gap:5px;flex-wrap:wrap}
.sla-row{display:flex;gap:8px;margin-bottom:12px}
.sla-box{flex:1;border-radius:6px;padding:8px 10px}
.sla-tight{background:#FCEBEB;border:0.5px solid #F09595}
.sla-ok{background:#E1F5EE;border:0.5px solid #5DCAA5}
</style>
</head>

  <!-- Sidebar menu -->
  <div id="sidebar">
    <div class="menu-group">

<script>
var scenes = [


{
  title: 'What HAL does',
  steps: [
    {
      narrative: '<b>HAL — Hybrid Assignment Logic.</b><br><br>HAL assigns standard jobs. That is it. It watches the queue, runs the numbers, and puts a driver on each job. It does this every 30 seconds and every time a driver finishes a delivery.<br><br>For every assignment it considers three things:<br><br>— How fast can the driver reach the collection point — will they make the SLA?<br>— How far do they have to travel to get there — dead kilometres?<br>— How close are they to their daily target — do they need the work?<br><br>It balances those things and picks the best driver for each job. <em>Not the nearest driver. Not the hungriest driver. The best combination across the whole fleet at that moment.</em>',
      card: '<div class="sc-card">\n  <div style="font-size:22px;font-weight:500;color:#1e3a5f;margin-bottom:4px">You are in control.</div>\n  <div style="font-size:15px;color:#5f5e5a;margin-bottom:24px">HAL makes suggestions. You decide.</div>\n  <div class="sc-divider"></div>\n  <div style="margin-top:16px;display:flex;flex-direction:column;gap:12px">\n    <div style="display:flex;gap:12px;align-items:flex-start">\n      <div style="width:36px;height:36px;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✓</div>\n      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Assigns standard jobs automatically</div><div style="font-size:12px;color:#888780;margin-top:2px">Runs every 30 seconds and after every delivery</div></div>\n    </div>\n    <div style="display:flex;gap:12px;align-items:flex-start">\n      <div style="width:36px;height:36px;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✓</div>\n      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Surfaces decisions that need your judgment</div><div style="font-size:12px;color:#888780;margin-top:2px">Route matches, direction conflicts, tight SLA windows</div></div>\n    </div>\n    <div style="display:flex;gap:12px;align-items:flex-start">\n      <div style="width:36px;height:36px;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✓</div>\n      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Shows you the full picture for every prompt</div><div style="font-size:12px;color:#888780;margin-top:2px">ETAs, SLA margins, route fits, top 3 alternatives</div></div>\n    </div>\n    <div style="display:flex;gap:12px;align-items:flex-start">\n      <div style="width:36px;height:36px;border-radius:8px;background:#FCEBEB;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✕</div>\n      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Does not touch specials, splits, or customer calls</div><div style="font-size:12px;color:#888780;margin-top:2px">Anything that requires knowing the operation — that is yours</div></div>\n    </div>\n  </div>\n</div>'
    }
  ]
},

{
  title: 'The signals',
  steps: [
    {
      narrative: '<b>The three signals.</b><br><br>Every assignment HAL makes shows one of three signals. Here is what each one means and what it expects from you.<br><br><em>Most assignments are green. You will see amber occasionally. Red means look now.</em><br><br>There is also a fourth state — BLOCK — when no driver can make the SLA. That is not a dispatch decision. It is a customer call.',
      card: '<div class="sc-card">\n  <div style="display:flex;flex-direction:column;gap:14px">\n    <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;border-bottom:0.5px solid #e0deda">\n      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">🟢</div>\n      <div>\n        <div style="font-size:13px;font-weight:500;color:#2c2c2a">ASSIGN — HAL has made this assignment</div>\n        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">SLA is comfortable, fit is good. No action needed unless you disagree. If you do — override it.</div>\n      </div>\n    </div>\n    <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;border-bottom:0.5px solid #e0deda">\n      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">🟡</div>\n      <div>\n        <div style="font-size:13px;font-weight:500;color:#2c2c2a">FLAG — assigned but something is tight</div>\n        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">SLA margin under 15 minutes, or a batch where one job\'s window is closing. HAL has proceeded. You can leave it, adjust it, or override. Default is to leave it.</div>\n      </div>\n    </div>\n    <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;border-bottom:0.5px solid #e0deda">\n      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">🔴</div>\n      <div>\n        <div style="font-size:13px;font-weight:500;color:#2c2c2a">ASSIGN NOW — needs your attention immediately</div>\n        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">SLA under 15 minutes. HAL has made the best assignment it can find. Look at it now. If the driver cannot make it, you manage the customer.</div>\n      </div>\n    </div>\n    <div style="display:flex;gap:12px;align-items:flex-start">\n      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">⛔</div>\n      <div>\n        <div style="font-size:13px;font-weight:500;color:#2c2c2a">BLOCK — no driver can make the SLA</div>\n        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">This is not a dispatch decision — it is a customer call. The job will be late. HAL assigns the best available driver, but you need to manage the customer.</div>\n      </div>\n    </div>\n  </div>\n</div>'
    }
  ]
},

{
  title: 'What stays the same',
  steps: [
    {
      narrative: '<b>What stays exactly the same.</b><br><br>HAL handles the standard queue. <em>Everything else is unchanged.</em><br><br>Your judgment, your customer relationships, your knowledge of the operation — none of that is replaced. It is the reason the system works. HAL does the arithmetic. You do the rest.<br><br>During parallel running every HAL assignment can be overridden. Override whenever you think HAL is wrong. Note what you did and why — one line is enough. <em>Your overrides are not failures. They are data. They are what makes the system better.</em>',
      card: '<div class="sc-card">\n  <div style="font-size:13px;font-weight:500;color:#1e3a5f;margin-bottom:14px">What HAL does not know</div>\n  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">\n    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">A customer has a preference for a specific driver</div>\n    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">A driver is having a bad day</div>\n    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">The road is closed on the quays</div>\n    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">Who needs the earnings today more than the numbers say</div>\n    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">When to call the customer rather than the driver</div>\n  </div>\n  <div class="sc-divider"></div>\n  <div style="font-size:13px;font-weight:500;color:#1e3a5f;margin:14px 0 12px">What stays exactly the same</div>\n  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">\n    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you handle late jobs and customer calls</div>\n    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you manage drivers who go offline</div>\n    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you assign specials</div>\n    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you create and manage split jobs</div>\n    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px;grid-column:1/-1">Your judgment on anything that does not look right</div>\n  </div>\n</div>'
    }
  ]
},

{
  title: 'How HAL thinks',
  steps: [
    {
      narrative: '<b>How HAL thinks.</b><br><br>HAL does not ask "who is nearest?" It asks a different question for every job:<br><br><em>"Who can reach this collection in time, and what does assigning it to them cost the customers they are already committed to?"</em><br><br>The eight scenes that follow show HAL working through real dispatch decisions — the kind that happen every day. Some it handles silently. Some it surfaces to you. In every case it shows its working.<br><br>The dispatcher sees what HAL sees. The dispatcher decides.',
      card: '<div class="sc-card">\n  <div style="font-size:15px;font-weight:500;color:#1e3a5f;margin-bottom:6px">Not the nearest driver.</div>\n  <div style="font-size:13px;color:#5f5e5a;margin-bottom:20px;line-height:1.6">The driver whose route absorbs this job most naturally.</div>\n  <div class="sc-divider"></div>\n  <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">\n    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <span style="font-size:12px;color:#5f5e5a">SLA urgency</span>\n      <div style="display:flex;gap:4px">\n        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n      </div>\n      <span style="font-size:12px;font-weight:500;color:#1e3a5f">60%</span>\n    </div>\n    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <span style="font-size:12px;color:#5f5e5a">Dead mileage</span>\n      <div style="display:flex;gap:4px">\n        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n      </div>\n      <span style="font-size:12px;font-weight:500;color:#1e3a5f">20%</span>\n    </div>\n    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <span style="font-size:12px;color:#5f5e5a">Route fit</span>\n      <div style="display:flex;gap:4px">\n        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n      </div>\n      <span style="font-size:12px;font-weight:500;color:#1e3a5f">10%</span>\n    </div>\n    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <span style="font-size:12px;color:#5f5e5a">Earnings fairness</span>\n      <div style="display:flex;gap:4px">\n        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>\n      </div>\n      <span style="font-size:12px;font-weight:500;color:#1e3a5f">10%</span>\n    </div>\n  </div>\n  <div style="margin-top:16px;padding:10px 12px;background:#E1F5EE;border-radius:6px;font-size:12px;color:#085041;line-height:1.5">The eight scenes that follow show HAL working through real decisions. Some it handles silently. Some it brings to you. In every case it shows its working.</div>\n</div>'
    }

{
  title: 'How HAL scores',
  steps: [
    {
      narrative: '<b>How HAL scores each driver.</b><br><br>For every job that arrives, HAL scores every available driver across four factors and picks the best overall fit.<br><br>The collection SLA is not a hard cut-off. A driver with 45 minutes of margin scores well. A driver with 8 minutes scores poorly and surfaces as an amber or red prompt. Only when no driver can reach the collection in time does HAL block the job — that is a customer call, not a dispatch decision.<br><br>The SLA window is not a fixed number — it stretches with distance. A job collecting inside the cargo zone has 60 minutes. Every kilometre beyond the cargo zone boundary adds 2 minutes. A Swords collection has a 77-minute window. A Bray collection has 89 minutes.<br><br>The margin is what matters — how much time is left after the driver gets there. A driver with a 45-minute margin is a better fit than one with 8 minutes, even if the ETA is the same.',
      card: '<div class="sc-card"><div style="font-size:14px;font-weight:600;color:#1e3a5f;margin-bottom:16px">SLA window — how it is calculated</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px"><div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f8f7f5;border-radius:6px"><div style="width:10px;height:10px;border-radius:50%;background:#1D9E75;flex-shrink:0"></div><div style="flex:1;font-size:12px;color:#2c2c2a">Inside the cargo zone (city zone)</div><div style="font-size:13px;font-weight:600;color:#1D9E75">60 min</div></div><div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f8f7f5;border-radius:6px"><div style="width:10px;height:10px;border-radius:50%;background:#185FA5;flex-shrink:0"></div><div style="flex:1;font-size:12px;color:#2c2c2a">Blackrock · 6km out</div><div style="font-size:13px;font-weight:600;color:#185FA5">63 min</div></div><div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f8f7f5;border-radius:6px"><div style="width:10px;height:10px;border-radius:50%;background:#534AB7;flex-shrink:0"></div><div style="flex:1;font-size:12px;color:#2c2c2a">Blanchardstown · 9km out</div><div style="font-size:13px;font-weight:600;color:#534AB7">69 min</div></div><div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f8f7f5;border-radius:6px"><div style="width:10px;height:10px;border-radius:50%;background:#BA7517;flex-shrink:0"></div><div style="flex:1;font-size:12px;color:#2c2c2a">Swords · 13km out</div><div style="font-size:13px;font-weight:600;color:#BA7517">77 min</div></div><div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:#f8f7f5;border-radius:6px"><div style="width:10px;height:10px;border-radius:50%;background:#A32D2D;flex-shrink:0"></div><div style="flex:1;font-size:12px;color:#2c2c2a">Bray · 24km out</div><div style="font-size:13px;font-weight:600;color:#A32D2D">89 min</div></div></div><div style="font-size:11px;color:#888780;padding:8px 12px;background:#f8f7f5;border-radius:6px;line-height:1.5;margin-bottom:16px">Formula: 60 min + (2 min × km beyond cargo zone boundary). Priority jobs use a tighter window — 30 min inside the cargo zone, same distance factor beyond.</div><div style="font-size:14px;font-weight:600;color:#1e3a5f;margin-bottom:4px">Delivery SLA</div><div style="font-size:12px;color:#888780;margin-bottom:12px;line-height:1.5">Calculated per job: collection SLA + estimated drive time (collection → delivery) + buffer. The window reflects where the package actually needs to go — not just where it was collected.</div><div style="display:flex;flex-direction:column;gap:8px"><div style="padding:10px 12px;background:#f8f7f5;border-radius:6px"><div style="font-size:12px;font-weight:500;color:#2c2c2a;margin-bottom:6px">Standard — collection SLA + drive time + 15 min buffer</div><div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1;padding:8px 10px;background:#fff;border-radius:6px;border:0.5px solid #e0deda"><div style="font-size:10px;color:#888780;margin-bottom:3px">Dundrum → Clonskeagh (2.4km)</div><div style="font-size:12px;color:#2c2c2a">Collection SLA <span style="font-weight:600;color:#1D9E75">63 min</span></div><div style="font-size:12px;color:#2c2c2a">Drive <span style="font-weight:600">6 min</span> + buffer <span style="font-weight:600">15 min</span></div><div style="font-size:13px;font-weight:600;color:#185FA5;margin-top:4px">Delivery SLA: 84 min</div></div><div style="flex:1;padding:8px 10px;background:#fff;border-radius:6px;border:0.5px solid #e0deda"><div style="font-size:10px;color:#888780;margin-bottom:3px">Dundrum → Balbriggan (35km)</div><div style="font-size:12px;color:#2c2c2a">Collection SLA <span style="font-weight:600;color:#1D9E75">63 min</span></div><div style="font-size:12px;color:#2c2c2a">Drive <span style="font-weight:600">86 min</span> + buffer <span style="font-weight:600">15 min</span></div><div style="font-size:13px;font-weight:600;color:#185FA5;margin-top:4px">Delivery SLA: 164 min</div></div></div><div style="font-size:11px;color:#888780;line-height:1.5">Same collection point, very different delivery windows. The ×1.8 shortcut would give both jobs 113 minutes — too generous for Clonskeagh, impossible for Balbriggan.</div></div><div style="padding:10px 12px;background:#FCEBEB;border-radius:6px"><div style="font-size:12px;font-weight:500;color:#8B1A1A;margin-bottom:6px">Priority — collection SLA + drive time + 10 min buffer</div><div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1;padding:8px 10px;background:#fff;border-radius:6px;border:0.5px solid #F09595"><div style="font-size:10px;color:#888780;margin-bottom:3px">Dundrum → Clonskeagh (2.4km)</div><div style="font-size:12px;color:#791F1F">Collection SLA <span style="font-weight:600">48 min</span></div><div style="font-size:12px;color:#791F1F">Drive <span style="font-weight:600">6 min</span> + buffer <span style="font-weight:600">10 min</span></div><div style="font-size:13px;font-weight:600;color:#A32D2D;margin-top:4px">Delivery SLA: 64 min</div></div><div style="flex:1;padding:8px 10px;background:#fff;border-radius:6px;border:0.5px solid #F09595"><div style="font-size:10px;color:#888780;margin-bottom:3px">Dundrum → Balbriggan (35km)</div><div style="font-size:12px;color:#791F1F">Collection SLA <span style="font-weight:600">48 min</span></div><div style="font-size:12px;color:#791F1F">Drive <span style="font-weight:600">86 min</span> + buffer <span style="font-weight:600">10 min</span></div><div style="font-size:13px;font-weight:600;color:#A32D2D;margin-top:4px">Delivery SLA: 144 min</div></div></div><div style="font-size:11px;color:#791F1F;line-height:1.5">Shorter collection window and tighter buffer than standard. For a long-haul job like Balbriggan, the delivery window is still 144 minutes — realistic because the drive alone takes 86 minutes.</div></div><div style="padding:10px 12px;background:#EEEDFE;border-radius:6px"><div style="font-size:12px;font-weight:500;color:#3C3489;margin-bottom:4px">Return leg</div><div style="font-size:11px;color:#3C3489;line-height:1.5">Some drivers have a contracted return to the cargo zone as part of their run. A driver who picks up in the city, delivers to Sandyford, and is committed to returning has a return SLA as well as a delivery SLA. HAL tracks that return window separately. Adding a second delivery to that run — even one that looks like a natural batch — can push the return arrival beyond its window. This is a different scenario from the route direction scene, which is about whose existing run absorbs a new job most naturally. The return leg SLA scene shows exactly what happens when the return window is breached.</div></div></div></div>'
    },
    {
      narrative: '<b>How HAL scores each driver.</b><br><br>Once HAL knows the SLA window, it calculates a score for every driver who can make the collection in time.<br><br>The score is a weighted combination of four factors. <em>SLA urgency carries the most weight</em> — a tight window is the most important signal. Dead mileage comes second — unnecessary travel wastes time and money. Route fit and earnings fairness fine-tune the result.<br><br>The driver with the lowest score wins. HAL is not looking for the fastest driver — it is looking for the best overall fit across the whole fleet at that moment.',
      card: '<div class="sc-card">\n  <div style="font-size:14px;font-weight:600;color:#1e3a5f;margin-bottom:16px">Driver scoring — the four factors</div>\n  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">\n    <div style="padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">\n        <span style="font-size:12px;font-weight:500;color:#2c2c2a">SLA urgency</span>\n        <span style="font-size:13px;font-weight:700;color:#1e3a5f">60%</span>\n      </div>\n      <div style="height:6px;background:#e0deda;border-radius:3px;overflow:hidden">\n        <div style="width:60%;height:100%;background:#1e3a5f;border-radius:3px"></div>\n      </div>\n      <div style="font-size:11px;color:#888780;margin-top:5px">How much of the collection window remains. A driver arriving with 8 minutes left scores worse than one with 45 minutes.</div>\n    </div>\n    <div style="padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">\n        <span style="font-size:12px;font-weight:500;color:#2c2c2a">Dead mileage</span>\n        <span style="font-size:13px;font-weight:700;color:#1e3a5f">20%</span>\n      </div>\n      <div style="height:6px;background:#e0deda;border-radius:3px;overflow:hidden">\n        <div style="width:20%;height:100%;background:#185FA5;border-radius:3px"></div>\n      </div>\n      <div style="font-size:11px;color:#888780;margin-top:5px">Distance the driver travels to reach the collection. Shorter is better — unnecessary travel costs time and fuel.</div>\n    </div>\n    <div style="padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">\n        <span style="font-size:12px;font-weight:500;color:#2c2c2a">Route fit</span>\n        <span style="font-size:13px;font-weight:700;color:#1e3a5f">10%</span>\n      </div>\n      <div style="height:6px;background:#e0deda;border-radius:3px;overflow:hidden">\n        <div style="width:10%;height:100%;background:#534AB7;border-radius:3px"></div>\n      </div>\n      <div style="font-size:11px;color:#888780;margin-top:5px">Time added to a driver\'s existing run by inserting this job. A job that fits naturally adds minutes. A detour adds much more.</div>\n    </div>\n    <div style="padding:10px 12px;background:#f8f7f5;border-radius:6px">\n      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">\n        <span style="font-size:12px;font-weight:500;color:#2c2c2a">Earnings fairness</span>\n        <span style="font-size:13px;font-weight:700;color:#1e3a5f">10%</span>\n      </div>\n      <div style="height:6px;background:#e0deda;border-radius:3px;overflow:hidden">\n        <div style="width:10%;height:100%;background:#1D9E75;border-radius:3px"></div>\n      </div>\n      <div style="font-size:11px;color:#888780;margin-top:5px">How close the driver is to their daily target. Helps distribute work fairly across the fleet without compromising SLA or efficiency.</div>\n    </div>\n  </div>\n</div>'
    },
    {
      narrative: '<b>How HAL scores each driver.</b><br><br>Here is a worked example. A new job arrives at Blanchardstown — 9km from the city, 69-minute SLA window.<br><br>HAL checks three drivers. All three can make the SLA. But their scores are different because of how far they are, what they are already doing, and how naturally the job fits their current run.<br><br><em>Declan has a route that passes through the area — near-zero route fit impact. He scores best despite not being the nearest driver on the map.</em>',
      card: '<div class="sc-note">Job: Blanchardstown collect · 69 min SLA window · three drivers considered</div>\n<div class="sc-card">\n  <div style="font-size:11px;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px">Driver comparison</div>\n  <div class="sc-alt" style="padding:10px 0">\n    <div class="sc-adot" style="background:#E1F5EE;color:#085041">DM</div>\n    <div class="sc-ainfo">\n      <div class="sc-aname">Declan <span style="font-size:10px;font-weight:500;background:#E6F1FB;color:#0C447C;border-radius:3px;padding:1px 5px;margin-left:4px">route match</span></div>\n      <div class="sc-adet">West corridor · ETA 14 min · 55 min margin · +3 min to existing run</div>\n      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#D1F5E8;color:#065535">SLA ✓ 55 min</span>\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#D1F5E8;color:#065535">Fit ✓ +3 min</span>\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#D1F5E8;color:#065535">Score: best</span>\n      </div>\n    </div>\n  </div>\n  <div class="sc-alt" style="padding:10px 0">\n    <div class="sc-adot" style="background:#FAEEDA;color:#633806">NL</div>\n    <div class="sc-ainfo">\n      <div class="sc-aname">Niall</div>\n      <div class="sc-adet">City base · ETA 22 min · 47 min margin · no committed jobs</div>\n      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FDEDC8;color:#7A3F00">SLA ✓ 47 min</span>\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#D1F5E8;color:#065535">Fit ✓ clean</span>\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FDEDC8;color:#7A3F00">Score: mid</span>\n      </div>\n    </div>\n  </div>\n  <div class="sc-alt" style="padding:10px 0;border-bottom:none">\n    <div class="sc-adot" style="background:#EEEDFE;color:#3C3489">CM</div>\n    <div class="sc-ainfo">\n      <div class="sc-aname">Ciarán</div>\n      <div class="sc-adet">SE corridor heading outbound · ETA 31 min · 38 min margin · detour required</div>\n      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FDDEDE;color:#8B1A1A">SLA ✓ 38 min</span>\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FDDEDE;color:#8B1A1A">Fit +18 min</span>\n        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FDDEDE;color:#8B1A1A">Score: weakest</span>\n      </div>\n    </div>\n  </div>\n  <div style="margin-top:12px;padding:10px 12px;background:#C8EFE0;border-radius:6px;font-size:12px;font-weight:600;color:#065535;border-left:3px solid #1D9E75">HAL assigns Declan. Best margin, best route fit, west corridor already committed.</div>\n</div>'
    }
  ]
},

{
  title: 'HAL at work',
  steps: [
    {
      narrative: '<b>Scene 1 — HAL at work.</b><br><br><b>Job 1 — Pearse Street → Blackrock.</b> HAL scores every available driver. Nearest wins: 5 minutes, 55-minute SLA margin. Assigned silently. The dispatcher sees nothing.<br><br><b>Job 2 — Capel Street → Dun Laoghaire.</b> Pickup is 2km from Pearse Street. The driver who just took Job 1 is heading southeast. HAL spots the route match and surfaces a prompt.<br><br>Inserting Job 2 adds 14 minutes to the route. <em>Is it worth loading the same driver, or send someone fresh?</em> HAL shows both options. The dispatcher decides.<br><br><em>Two jobs dispatched. One decision surfaced. HAL working in the background — asking for attention only when it matters.</em>',

var cur = 0;
var curStep = 0;

function goto(i) {
  cur = i; curStep = 0; build();
}

function build() {
  var s = scenes[cur];
  var step = s.steps[curStep];

  document.getElementById('scene-title').textContent = s.title;
  document.getElementById('scene-text').innerHTML = step.narrative;
  document.getElementById('card-area').innerHTML = step.card;

  var pct = ((cur + (curStep+1)/s.steps.length) / scenes.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('scene-counter').textContent = (cur+1) + ' / ' + scenes.length;

  document.getElementById('btn-prev').disabled = (cur === 0 && curStep === 0);
  document.getElementById('btn-next').disabled = (cur === scenes.length-1 && curStep === s.steps.length-1);

  var stepNav = document.getElementById('step-nav');
  if (s.steps.length > 1) {
    stepNav.style.display = 'flex';
    stepNav.innerHTML = '';
    s.steps.forEach(function(st, i) {
      var b = document.createElement('button');
      b.className = 'step-btn' + (i === curStep ? ' active' : '');
      b.textContent = 'Step ' + (i+1);
      b.onclick = (function(idx){ return function(){ curStep=idx; build(); }; })(i);
      stepNav.appendChild(b);
    });
  } else {
    stepNav.style.display = 'none';
  }

  // Update sidebar active state
  for (var i = 0; i < scenes.length; i++) {
    var mi = document.getElementById('mi-'+i);
    if (mi) mi.classList.toggle('active', i === cur);
  }
}

function move(dir) {
  var s = scenes[cur];
  if (dir > 0) {
    if (curStep < s.steps.length - 1) { curStep++; }
    else if (cur < scenes.length - 1) { cur++; curStep = 0; }
  } else {
    if (curStep > 0) { curStep--; }
    else if (cur > 0) { cur--; curStep = scenes[cur].steps.length - 1; }
  }
  build();
}

window.addEventListener('load', function() { build(); });
</script>
