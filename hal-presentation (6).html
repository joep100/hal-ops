<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAL — Hybrid Assignment Logic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f5;color:#2c2c2a;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
#topbar{background:#1e3a5f;color:#e0eaff;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;flex-shrink:0}
#topbar h1{font-size:16px;font-weight:500;letter-spacing:0.04em}
#topbar .sub{font-size:12px;opacity:0.6}
#scene-counter{margin-left:auto;font-size:12px;opacity:0.5}

/* Scene nav dots */
#scene-nav{background:#fff;border-bottom:0.5px solid #e0deda;padding:0 24px;height:48px;display:flex;align-items:center;gap:6px;flex-shrink:0;overflow-x:auto}
.snav-btn{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid #d3d1c7;background:transparent;color:#888780;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s}
.snav-btn.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
.snav-btn:hover:not(.active){background:#f1efe8;color:#444441}

/* Main layout */
#main{flex:1;display:flex;min-height:0}

/* Left: narrative */
#narrative{width:38%;background:#f8f7f5;border-right:0.5px solid #d3d1c7;padding:28px 28px 20px;display:flex;flex-direction:column;overflow-y:auto}
#scene-title{font-size:20px;font-weight:600;color:#1e3a5f;margin-bottom:18px;line-height:1.3}
#scene-text{font-size:14px;line-height:1.8;color:#2c2c2a;flex:1}
#scene-text b{color:#1e3a5f;font-weight:600}
#scene-text em{color:#C05500;font-style:normal;font-weight:600}

/* Step nav for staged scenes */
#step-nav{display:none;gap:6px;margin-top:16px;padding-top:16px;border-top:0.5px solid #e0deda}
.step-btn{flex:1;font-size:11px;padding:6px 0;border-radius:6px;border:0.5px solid #d3d1c7;background:#f8f7f5;color:#5f5e5a;cursor:pointer;font-family:inherit;text-align:center;transition:all 0.15s}
.step-btn.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
.step-btn:hover:not(.active){background:#f1efe8}

/* Right: scene card */
#card-area{flex:1;overflow-y:auto;padding:20px 24px;background:#f8f7f5}

/* Prev/next */
#nav-bar{background:#fff;border-top:0.5px solid #e0deda;padding:0 24px;height:48px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-btn{font-size:13px;padding:6px 16px;border-radius:6px;border:0.5px solid #d3d1c7;background:#fff;color:#444441;cursor:pointer;font-family:inherit;transition:all 0.15s}
.nav-btn:hover{background:#f1efe8}
.nav-btn:disabled{opacity:0.3;cursor:default}
#progress-bar{flex:1;height:4px;background:#e0deda;border-radius:2px;overflow:hidden}
#progress-fill{height:100%;background:#1e3a5f;border-radius:2px;transition:width 0.4s}

/* Scene card components */
.sc-note{font-size:13px;color:#444441;line-height:1.55;padding:9px 12px;background:#fff;border-radius:8px;margin-bottom:10px;border-left:3px solid #EF9F27;border:0.5px solid #e0deda;border-left-width:3px;border-left-color:#EF9F27}
.sc-card{background:#fff;border:0.5px solid #e0deda;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.sc-pill{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:3px 11px 3px 3px;margin-bottom:11px}
.sc-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;flex-shrink:0}
.sc-route{display:flex;flex-direction:column;margin:8px 0 0 2px}
.sc-stop{display:flex;align-items:flex-start;gap:8px}
.sc-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:600}
.ic-col{background:#E6F1FB;color:#0C447C;border:1.5px solid #85B7EB}
.ic-new{background:#FAEEDA;color:#633806;border:1.5px solid #EF9F27}
.ic-del{background:#F1EFE8;color:#444441;border:1.5px solid #B4B2A9}
.ic-breach{background:#FCEBEB;color:#791F1F;border:1.5px solid #F09595}
.ic-ret{background:#EEEDFE;color:#3C3489;border:1.5px solid #AFA9EC}
.sc-line{width:1px;background:#d3d1c7;height:18px;margin-left:11px}
.sc-line-warn{width:1px;background:#F09595;height:18px;margin-left:11px;opacity:0.7}
.sc-body{padding-bottom:14px;flex:1}
.sc-body.last{padding-bottom:0}
.sc-lbl{font-size:13px;font-weight:500;color:#2c2c2a;line-height:1.3}
.sc-sub{font-size:12px;color:#666460;margin-top:1px}
.sc-time{font-size:13px;font-weight:600;white-space:nowrap;margin-left:auto;padding-left:8px}
.t-hi{color:#1D9E75}.t-red{color:#A32D2D}.t-muted{color:#888780}
.sc-tag{background:#FDEDC8;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;color:#7A3F00;margin-left:4px}
.sc-pritag{background:#FDDEDE;border-radius:3px;padding:1px 6px;font-size:10px;font-weight:600;color:#8B1A1A;margin-left:4px}
.sc-bretag{background:#FCEBEB;border-radius:3px;padding:0 5px;font-size:10px;font-weight:500;color:#791F1F;margin-left:4px}
.sc-stats{display:flex;gap:6px;margin-top:10px}
.sc-stat{flex:1;background:#f8f7f5;border-radius:6px;padding:8px 10px}
.sc-val{font-size:18px;font-weight:600;color:#2c2c2a;line-height:1}
.sc-val.amber{color:#854F0B}.sc-val.red{color:#A32D2D}.sc-val.green{color:#1D9E75}
.sc-lbl2{font-size:11px;color:#666460;margin-top:2px}
.sc-divider{height:0.5px;background:#e0deda;margin:12px 0}
.sc-prompt-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.sc-pdot{width:7px;height:7px;border-radius:50%;background:#BA7517;flex-shrink:0}
.sc-pdot.red{background:#E24B4A}
.sc-ptitle{font-size:14px;font-weight:600;color:#2c2c2a}
.sc-alt{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:0.5px solid #e0deda}
.sc-alt:last-child{border-bottom:none}
.sc-adot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.sc-ainfo{flex:1}
.sc-aname{font-size:13px;font-weight:500;color:#2c2c2a}
.sc-adet{font-size:12px;color:#555452;margin-top:1px;line-height:1.4}
.sc-abadge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;margin-top:2px;display:inline-block}
.ab-green{background:#D1F5E8;color:#065535;font-weight:600}
.ab-amber{background:#FDEDC8;color:#7A3F00;font-weight:600}
.ab-red{background:#FDDEDE;color:#8B1A1A;font-weight:600}
.ab-gray{background:#F1EFE8;color:#5F5E5A}
.ab-blue{background:#E6F1FB;color:#0C447C}
.sc-verdict{background:#C8EFE0;border-radius:6px;padding:10px 12px;font-size:12px;font-weight:600;color:#065535;margin-top:10px;line-height:1.5;border-left:3px solid #1D9E75}
.sc-warn{padding:9px 12px;border-radius:6px;background:#FCEBEB;border:0.5px solid #F09595;margin-top:10px;font-size:11px;color:#791F1F;line-height:1.5}
.sc-info{padding:9px 12px;border-radius:6px;background:#f8f7f5;border:0.5px solid #e0deda;margin-top:10px;font-size:11px;color:#5f5e5a;line-height:1.5;border-left:2px solid #d3d1c7}
.sc-jobrow{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid #e0deda}
.sc-jobrow:last-child{border-bottom:none}
.sc-jid{font-size:10px;font-weight:500;color:#888780;width:24px;flex-shrink:0}
.sc-jname{font-size:13px;font-weight:500;color:#2c2c2a;flex:1}
.sc-jtag{font-size:10px;font-weight:500;border-radius:3px;padding:1px 5px}
.jt-silent{background:#D1F5E8;color:#065535;font-weight:600}
.jt-prompt{background:#FDEDC8;color:#7A3F00;font-weight:600}
.sc-stag{font-size:9px;font-weight:500;padding:1px 4px;border-radius:3px;margin-left:4px}
.st-c{background:#E6F1FB;color:#0C447C}
.st-f{background:#E1F5EE;color:#085041}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt-card{border:0.5px solid #e0deda;border-radius:8px;padding:11px 13px}
.opt-card.good{border-color:#5DCAA5;border-width:1.5px}
.opt-card.bad{border-color:#F09595}
.opt-label{font-size:10px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:5px}
.sla-row{display:flex;gap:8px;margin-bottom:12px}
.sla-box{flex:1;border-radius:6px;padding:8px 10px}
.sla-tight{background:#FCEBEB;border:0.5px solid #F09595}
.sla-ok{background:#E1F5EE;border:0.5px solid #5DCAA5}
.corridor-hdr{display:flex;align-items:center;gap:7px;margin:12px 0 8px;padding-bottom:6px;border-bottom:0.5px solid #e0deda}
.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.time-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;white-space:nowrap}
.tp-green{background:#E1F5EE;color:#085041}
.tp-amber{background:#FAEEDA;color:#633806}
.tp-red{background:#FCEBEB;color:#791F1F}
.drv-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #e0deda}
.drv-row:last-child{border-bottom:none}
.drv-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.drv-name{font-size:12px;font-weight:500;color:#2c2c2a;flex:1}
.drv-times{display:flex;gap:5px;flex-wrap:wrap}
</style>
</head>
<body>

<div id="topbar">
  <h1>HAL</h1>
  <span class="sub">Hybrid Assignment Logic &middot; Dublin courier dispatch</span>
  <span id="scene-counter"></span>
</div>

<div id="scene-nav" id="scene-nav"></div>

<div id="main">
  <div id="narrative">
    <div id="scene-title"></div>
    <div id="scene-text"></div>
    <div id="step-nav" style="display:flex"></div>
  </div>
  <div id="card-area"></div>
</div>

<div id="nav-bar">
  <button class="nav-btn" id="btn-prev" onclick="move(-1)">&#8592; Previous</button>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <button class="nav-btn" id="btn-next" onclick="move(1)">Next &#8594;</button>
</div>

<script>
var scenes = [


{
  title: 'What HAL does',
  steps: [
    {
      narrative: '<b>HAL — Hybrid Assignment Logic.</b><br><br>HAL assigns standard jobs. That is it. It watches the queue, runs the numbers, and puts a driver on each job. It does this every 30 seconds and every time a driver finishes a delivery.<br><br>For every assignment it considers three things:<br><br>— How fast can the driver reach the collection point — will they make the SLA?<br>— How far do they have to travel to get there — dead kilometres?<br>— How close are they to their daily target — do they need the work?<br><br>It balances those things and picks the best driver for each job. <em>Not the nearest driver. Not the hungriest driver. The best combination across the whole fleet at that moment.</em>',
      card: `<div class="sc-card">
  <div style="font-size:22px;font-weight:500;color:#1e3a5f;margin-bottom:4px">You are in control.</div>
  <div style="font-size:15px;color:#5f5e5a;margin-bottom:24px">HAL makes suggestions. You decide.</div>
  <div class="sc-divider"></div>
  <div style="margin-top:16px;display:flex;flex-direction:column;gap:12px">
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:36px;height:36px;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✓</div>
      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Assigns standard jobs automatically</div><div style="font-size:12px;color:#888780;margin-top:2px">Runs every 30 seconds and after every delivery</div></div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:36px;height:36px;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✓</div>
      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Surfaces decisions that need your judgment</div><div style="font-size:12px;color:#888780;margin-top:2px">Route matches, direction conflicts, tight SLA windows</div></div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:36px;height:36px;border-radius:8px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✓</div>
      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Shows you the full picture for every prompt</div><div style="font-size:12px;color:#888780;margin-top:2px">ETAs, SLA margins, insertion costs, top 3 alternatives</div></div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="width:36px;height:36px;border-radius:8px;background:#FCEBEB;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">✕</div>
      <div><div style="font-size:13px;font-weight:500;color:#2c2c2a">Does not touch specials, splits, or customer calls</div><div style="font-size:12px;color:#888780;margin-top:2px">Anything that requires knowing the operation — that is yours</div></div>
    </div>
  </div>
</div>`
    }
  ]
},

{
  title: 'The signals',
  steps: [
    {
      narrative: '<b>The three signals.</b><br><br>Every assignment HAL makes shows one of three signals. Here is what each one means and what it expects from you.<br><br><em>Most assignments are green. You will see amber occasionally. Red means look now.</em><br><br>There is also a fourth state — BLOCK — when no driver can make the SLA. That is not a dispatch decision. It is a customer call.',
      card: `<div class="sc-card">
  <div style="display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;border-bottom:0.5px solid #e0deda">
      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">🟢</div>
      <div>
        <div style="font-size:13px;font-weight:500;color:#2c2c2a">ASSIGN — HAL has made this assignment</div>
        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">SLA is comfortable, fit is good. No action needed unless you disagree. If you do — override it.</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;border-bottom:0.5px solid #e0deda">
      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">🟡</div>
      <div>
        <div style="font-size:13px;font-weight:500;color:#2c2c2a">FLAG — assigned but something is tight</div>
        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">SLA margin under 15 minutes, or a batch where one job's window is closing. HAL has proceeded. You can leave it, adjust it, or override. Default is to leave it.</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding-bottom:14px;border-bottom:0.5px solid #e0deda">
      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">🔴</div>
      <div>
        <div style="font-size:13px;font-weight:500;color:#2c2c2a">ASSIGN NOW — needs your attention immediately</div>
        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">SLA under 15 minutes. HAL has made the best assignment it can find. Look at it now. If the driver cannot make it, you manage the customer.</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="font-size:20px;flex-shrink:0;width:28px;text-align:center">⛔</div>
      <div>
        <div style="font-size:13px;font-weight:500;color:#2c2c2a">BLOCK — no driver can make the SLA</div>
        <div style="font-size:12px;color:#5f5e5a;margin-top:4px;line-height:1.5">This is not a dispatch decision — it is a customer call. The job will be late. HAL assigns the best available driver, but you need to manage the customer.</div>
      </div>
    </div>
  </div>
</div>`
    }
  ]
},

{
  title: 'What stays the same',
  steps: [
    {
      narrative: '<b>What stays exactly the same.</b><br><br>HAL handles the standard queue. <em>Everything else is unchanged.</em><br><br>Your judgment, your customer relationships, your knowledge of the operation — none of that is replaced. It is the reason the system works. HAL does the arithmetic. You do the rest.<br><br>During parallel running every HAL assignment can be overridden. Override whenever you think HAL is wrong. Note what you did and why — one line is enough. <em>Your overrides are not failures. They are data. They are what makes the system better.</em>',
      card: `<div class="sc-card">
  <div style="font-size:13px;font-weight:500;color:#1e3a5f;margin-bottom:14px">What HAL does not know</div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">A customer has a preference for a specific driver</div>
    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">A driver is having a bad day</div>
    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">The road is closed on the quays</div>
    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">Who needs the earnings today more than the numbers say</div>
    <div style="font-size:12px;color:#5f5e5a;padding:8px 12px;background:#f8f7f5;border-radius:6px;border-left:3px solid #d3d1c7">When to call the customer rather than the driver</div>
  </div>
  <div class="sc-divider"></div>
  <div style="font-size:13px;font-weight:500;color:#1e3a5f;margin:14px 0 12px">What stays exactly the same</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you handle late jobs and customer calls</div>
    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you manage drivers who go offline</div>
    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you assign specials</div>
    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px">How you create and manage split jobs</div>
    <div style="font-size:11px;color:#5f5e5a;padding:7px 10px;background:#E1F5EE;border-radius:6px;grid-column:1/-1">Your judgment on anything that does not look right</div>
  </div>
</div>`
    }
  ]
},

{
  title: 'How HAL thinks',
  steps: [
    {
      narrative: '<b>How HAL thinks.</b><br><br>HAL does not ask "who is nearest?" It asks a different question for every job:<br><br><em>"Who can reach this collection in time, and what does assigning it to them cost the customers they are already committed to?"</em><br><br>The eight scenes that follow show HAL working through real dispatch decisions — the kind that happen every day. Some it handles silently. Some it surfaces to you. In every case it shows its working.<br><br>The dispatcher sees what HAL sees. The dispatcher decides.',
      card: `<div class="sc-card">
  <div style="font-size:15px;font-weight:500;color:#1e3a5f;margin-bottom:6px">Not the nearest driver.</div>
  <div style="font-size:13px;color:#5f5e5a;margin-bottom:20px;line-height:1.6">The driver whose route absorbs this job most naturally.</div>
  <div class="sc-divider"></div>
  <div style="margin-top:16px;display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f7f5;border-radius:6px">
      <span style="font-size:12px;color:#5f5e5a">SLA urgency</span>
      <div style="display:flex;gap:4px">
        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>
        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>
        <div style="width:24px;height:8px;background:#1e3a5f;border-radius:2px"></div>
        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>
        <div style="width:24px;height:8px;background:#e0deda;border-radius:2px"></div>
      </div>
      <span style="font-size:12px;font-weight:500;color:#1e3a5f">60%</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f7f5;border-radius:6px">

var cur = 0;
var curStep = 0;

function build() {
  var s = scenes[cur];
  var step = s.steps[curStep];

  document.getElementById('scene-title').textContent = s.title;
  document.getElementById('scene-text').innerHTML = step.narrative;
  document.getElementById('card-area').innerHTML = step.card;

  var pct = ((cur + (curStep+1)/s.steps.length) / scenes.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('scene-counter').textContent = (cur+1) + ' / ' + scenes.length;

  document.getElementById('btn-prev').disabled = (cur === 0 && curStep === 0);
  document.getElementById('btn-next').disabled = (cur === scenes.length-1 && curStep === s.steps.length-1);

  var stepNav = document.getElementById('step-nav');
  if (s.steps.length > 1) {
    stepNav.style.display = 'flex';
    stepNav.innerHTML = '';
    s.steps.forEach(function(st, i) {
      var b = document.createElement('button');
      b.className = 'step-btn' + (i === curStep ? ' active' : '');
      b.textContent = 'Step ' + (i+1);
      b.onclick = (function(idx){ return function(){ curStep=idx; build(); }; })(i);
      stepNav.appendChild(b);
    });
  } else {
    stepNav.style.display = 'none';
  }

  document.querySelectorAll('.snav-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === cur);
  });
}

function move(dir) {
  var s = scenes[cur];
  if (dir > 0) {
    if (curStep < s.steps.length - 1) { curStep++; }
    else if (cur < scenes.length - 1) { cur++; curStep = 0; }
  } else {
    if (curStep > 0) { curStep--; }
    else if (cur > 0) { cur--; curStep = scenes[cur].steps.length - 1; }
  }
  build();
}

window.addEventListener('load', function() {
  var nav = document.getElementById('scene-nav');
  scenes.forEach(function(s, i) {
    var b = document.createElement('button');
    b.className = 'snav-btn';
    b.textContent = '\u2460\u2461\u2462\u2463\u2464\u2465\u2466\u2467'.charAt(i) + ' ' + s.title;
    b.onclick = (function(idx){ return function(){ cur=idx; curStep=0; build(); }; })(i);
    nav.appendChild(b);
  });
  build();
});
</script>
